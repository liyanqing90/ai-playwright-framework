name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install uv -i https://mirrors.tuna.tsinghua.edu.cn/pypi/web/simple/

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Check package entry points
        run: |
          uv run gen --help
          uv run run_case --help
          uv run ai-playwright-init --help
          uv run ai-playwright-install-browser --help

      - name: Compile Python
        run: uv run python -m compileall ai_playwright conftest.py check_duplicates.py validate_yaml_schema.py

      - name: Check formatting
        run: uv run black --check .

      - name: Run framework contract tests
        run: uv run pytest tests -q

      - name: Validate YAML action schema
        run: uv run python validate_yaml_schema.py

      - name: Check duplicate YAML definitions
        run: uv run python check_duplicates.py

      - name: Collect generated YAML tests
        run: uv run pytest --collect-only -q

      - name: Check whitespace
        run: git diff --check

      - name: Build package
        run: uv build

      - name: Check installed CLI from tempdir
        run: |
          tmpdir="$(mktemp -d)"
          pkgdir="$tmpdir/pkg"
          workdir="$tmpdir/work"
          mkdir -p "$pkgdir" "$workdir"
          uv pip install --target "$pkgdir" --no-deps dist/*.whl
          cd "$workdir"
          PKGDIR="$pkgdir" PYTHONPATH="$pkgdir" uv run python - <<'PY'
          import importlib.metadata as md
          import os
          import pathlib

          import ai_playwright

          pkgdir = pathlib.Path(os.environ["PKGDIR"]).resolve()
          package_file = pathlib.Path(ai_playwright.__file__).resolve()
          assert package_file.is_relative_to(pkgdir), package_file
          scripts = {
              ep.name
              for ep in md.entry_points(group="console_scripts")
              if ep.value.startswith("ai_playwright.")
          }
          assert {"run_case", "gen", "ai-playwright-init", "ai-playwright-install-browser"} <= scripts, scripts
          PY
          test -f "$pkgdir/ai_playwright/templates/test_data/demo/cases/saucedemo_ai.yaml"
          PYTHONPATH="$pkgdir" uv run python -m ai_playwright.cli.run_case --help
          PYTHONPATH="$pkgdir" uv run python -m ai_playwright.cli.generate_case --help
          PYTHONPATH="$pkgdir" uv run python -m ai_playwright.cli.init_project --help
          PYTHONPATH="$pkgdir" uv run python -m ai_playwright.cli.install_browser --help
          set +e
          PYTHONPATH="$pkgdir" uv run python -m ai_playwright.cli.run_case -p demo -f saucedemo_ai --headless -k __never_matches__
          status="$?"
          set -e
          test "$status" -eq 5
