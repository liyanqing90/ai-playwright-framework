elements:
  # 页面顶部横幅
  顶部横幅: .top_banner

  # 主导航区域 - 使用text定位更可靠
  买新车入口: text=买新车
  买二手车入口: text=买二手车
  高价卖车入口: text=高价卖车

  # 品牌列表 - 使用text定位品牌名称
  特斯拉品牌: text=特斯拉
  奥迪品牌: text=奥迪
  江铃集团新能源品牌: text=江铃集团新能源
  宾利品牌: text=宾利
  保时捷品牌: text=保时捷
  北汽瑞翔品牌: text=北汽瑞翔
  比亚迪品牌: text=比亚迪
  大众品牌: text=大众
  丰田品牌: text=丰田
  更多品牌: text=更多品牌

  # 品牌旗舰标识
  品牌旗舰标识: .brand_flag_ship

  # 横幅广告
  官方认证横幅: .shop-banner_img >> nth=0
  家家商城横幅: .shop-banner_img >> nth=1

  # 标签栏切换
  买新车标签: .tab_item >> text=买新车
  二手车标签: .tab_item >> text=二手车

  # 筛选按钮 - 使用text定位更准确
  全部价格: text=全部
  八万以下: text=8万以下
  八到十五万: text=8-15万
  十五到二十万: text=15-20万
  二十到二十五万: text=20-25万
  二十五到三十万: text=25-30万
  三十万以上: text=30万以上

  品牌筛选: text=品牌
  轿车筛选: text=轿车
  SUV筛选: text=SUV
  MPV筛选: text=MPV
  汽油车筛选: text=汽油车
  纯电动筛选: text=纯电动
  插电混动筛选: text=插电混动
  增程式筛选: text=增程式

  # 车辆卡片
  车辆卡片: .series_card
  第一个车辆卡片: .series_card >> nth=0
  第二个车辆卡片: .series_card >> nth=1
  第三个车辆卡片: .series_card >> nth=2

  # 车辆信息
  车辆品牌图标: .series_logo img
  车辆主图: .card_img img
  新能源标识: .ev-logo


  # 车辆列表容器
  车辆列表: .common_series_list
  瀑布流容器: .waterfall_list_container

  # 车辆卡片详细信息 - 使用具体的车型名称定位
  ModelY卡片: text=Model Y
  奥迪A4L卡片: text=奥迪A4L
  ModelYL卡片: text=Model Y L
  问界M7卡片: text=问界M7
  宝马5系卡片: text=宝马5系
  宝马3系卡片: text=宝马3系
  秦PLUS卡片: text=秦PLUS
  奥迪Q5L卡片: text=奥迪Q5L
  Model3卡片: text=Model 3
  哈弗猛龙新能源卡片: text=哈弗猛龙新能源

  # 价格相关元素
  万起价格: text=/万起/
  元起价格: text=/元起/
  原价: .drop-icon
  咨询人数: text=/已有.*人咨询/

  # 补贴信息
  平台补贴: text=/平台补贴/

  # 通用容器
  页面容器: .mall_home
  筛选容器: .filter_container
  品牌列表: .brand_list
  横幅容器: .banner_box

  # 筛选状态
  激活筛选: .filter-button.active
  普通筛选: .filter-button

  # 图片元素
  品牌图标: .brand_logo_img
  车辆图片: .card_img img

  # 交互元素
  可点击区域: '[role="button"]'
  链接: a

  # 加载状态
  加载中: .van-loading

  # 弹窗相关
  弹窗: .van-popup
  遮罩: .van-overlay

  # 表单元素
  输入框: input
  搜索框: 'input[type="search"]'

  # 页面结构
  顶部区域: .top_banner_container
  导航区域: .tangdou_nav
  筛选区域: .filter-sticky
  内容区域: .car_list_module