  test_mall_self_operated:
    description: "验证之家自营店"
    steps:
      - action: navigate
        value: "/?cityid=${city_id}"
      - action: assert_text_contains
        selector: header_title_text_container
        value: "下单送车上门"
      - action: assert_exists
        selector: first_discount_price
      - action: click
        selector: header_title_text_container
      - action: wait
        value: 1
      - action: assert_exists
        selector: tag_logo_img

  test_mall_brand_service:
    description: "验证认证店"
