      - action: click
        selector: shop_banner_footer_div
      - action: wait
        value: 1
      - action: assert_exists
        selector: tag_logo_img
      - action: assert_text_contains
        selector: store_info_title_div
        value: "邯郸钇帆汽车卖场店"
      - action: assert_text_contains
        selector: store_address_span
        value: "河北省邯郸市丛台区邯临公路与和谐大街交叉口西500米时代汽车广场B馆"

