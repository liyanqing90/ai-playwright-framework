test_data:
  test_store_list_query:
    - description: "门店列表查询"
      steps:
        - use_module: click_store_management
        - action: click
          selector: 门店列表
        - action: click
          selector: 租户选择
        - action: click
          selector: 租户选中
        - action: fill
          selector: 门店名称输入
          value: "上海宝信"
        - action: click
          selector: 门店类型选择
        - action: click
          selector: 门店类型选中
        - action: click
          selector: 营业状态选择
        - action: click
          selector: 营业状态
        - action: click
          selector: 门店列表查询
        - action: wait
        - action: assert_text
          selector: 列表门店名称
          value: "上海宝信"

  test_store_query_initiate_mode:
    - description: "门店查询启用状态"
      steps:
        - use_module: click_store_management
        - action: click
          selector: 门店列表
        - action: wait
        - action: click
          selector: 营业状态选择
        - action: click
          selector: 营业状态
        - action: click
          selector: 查询
        - action: wait
        - action: assert_text
          selector: 列表营业状态
          value: "营业"
        - action: click
          selector: 重置
        - action: click
          selector: 营业状态选择
        - action: click
          selector: 停业状态
        - action: click
          selector: 查询
        - action: wait
        - action: assert_text
          selector: 列表营业状态
          value: "停业"




