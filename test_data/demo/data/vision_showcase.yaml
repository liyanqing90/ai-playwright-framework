test_data:
  test_saucedemo_vision_fallback_login:
    description: smart标准兜底链路使用UI Vision定位登录主按钮
    mode: smart
    steps:
      - action: goto
        value: https://www.saucedemo.com/
      - action: fill
        selector: sauce_username_input
        value: ${standard_username}
      - action: fill
        selector: sauce_password_input
        value: ${common_password}
      - action: click
        target: primary submit action below credential fields for vision showcase
      - action: assert_text
        selector: sauce_page_title
        value: Products
