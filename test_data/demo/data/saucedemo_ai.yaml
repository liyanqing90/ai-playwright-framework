test_data:
  test_saucedemo_standard_user_add_backpack_to_cart:
    description: 标准用户登录后添加单个Sauce Labs Backpack到购物车
    mode: smart
    steps:
      - use_module: saucedemo_login
      - action: click
        selector: saucedemo_backpack_add
      - action: assert_text
        selector: saucedemo_cart_badge
        value: '1'
  test_saucedemo_locked_user_login_verify_locked_out_error:
    description: 锁定用户登录失败，验证错误提示包含locked out
    mode: smart
    steps:
      - action: goto
        value: ${saucedemo_url}
      - action: fill
        selector: saucedemo_username
        value: ${saucedemo_locked_user}
      - action: fill
        selector: saucedemo_password
        value: ${saucedemo_password_value}
      - action: click
        selector: saucedemo_login_button
      - action: assert_text_contains
        selector: saucedemo_error_message
        value: locked out
  test_saucedemo_standard_user_open_cart_page_verify_elements:
    description: 标准用户登录后打开购物车页面，验证购物车页面关键元素可见
    mode: smart
    steps:
      - use_module: saucedemo_login
      - action: click
        selector: saucedemo_cart_link
      - action: assert_visible
        selector: saucedemo_checkout_button
