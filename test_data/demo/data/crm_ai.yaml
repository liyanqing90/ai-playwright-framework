test_data:
  test_crm_steps_generated:
    mode: smart
    steps:
      - use_module: crm_login_and_navigate
        params:
          username: ${username}
          password: ${password}
      - use_module: crm_search_and_view_log
      - action: assert_title_contains
        value: 商品审核
      - action: assert_visible
        selector: crm_product_id_input
  test_crm_intent_generated:
    mode: smart
    steps:
      - use_module: crm_login_and_navigate
        params:
          username: ${username}
          password: ${password}
      - use_module: crm_search_and_view_log
      - action: assert_title_contains
        value: 商品审核
      - action: assert_visible
        selector: crm_product_id_input
