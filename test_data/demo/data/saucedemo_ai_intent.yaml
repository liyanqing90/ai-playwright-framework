test_data:
  test_saucedemo_standard_user_cart_logout_ai_generated:
    description: 打开 https://www.saucedemo.com/，标准用户登录 Saucedemo 
      后，添加指定商品到购物车，进入购物车确认商品和数量，然后从左侧菜单退出登录。
    mode: smart
    steps:
      - use_module: saucedemo_login
        params:
          username: ${standard_username}
      - action: assert_text
        selector: sauce_page_title
        value: Products
      - action: click
        selector: add_to_cart_backpack_btn
      - action: assert_text
        selector: shopping_cart_badge
        value: '1'
      - action: click
        selector: shopping_cart_link
      - action: assert_text
        selector: cart_title
        value: Your Cart
      - action: assert_visible
        selector: cart_item_backpack_name
      - action: click
        selector: menu_button
      - action: assert_visible
        selector: logout_sidebar_link
      - action: click
        selector: logout_sidebar_link
      - action: assert_visible
        selector: sauce_login_btn
