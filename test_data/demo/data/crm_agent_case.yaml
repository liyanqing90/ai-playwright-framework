test_data:
  test_crm_agent_case_steps_generated:
    type: agent_case
    steps:
      - 打开运营后台登录页 http://edit.ahohcrm.terra.corpautohome.com/#/login
      - 点击 OA登录
      - 输入用户名和密码
      - 点击登录按钮
      - 点击商城展开菜单
      - 点击商品审核
      - 输入商品id SPU17799383833255667
      - 点击查询按钮
      - 点击查看日志
    inputs:
      username: ${username}
      password: ${password}
      product_id: SPU17799383833255667
    checkpoints:
      - 页面标题包含商品审核
      - 商品ID输入框已输入 SPU17799383833255667
      - 查询按钮已执行
    final:
      - 当前页面仍在商品审核业务页

