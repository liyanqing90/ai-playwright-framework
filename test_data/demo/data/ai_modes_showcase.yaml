test_data:
  test_saucedemo_strict_cart_logout_flow:
    description: strict基线：登录、加购、查看购物车、退出登录全流程均使用稳定元素key
    mode: strict
    steps:
      - use_module: saucedemo_login
        description: 登录Saucedemo标准用户
        params:
          username: ${standard_username}
      - action: assert_text
        description: 断言登录后进入商品列表页
        selector: sauce_page_title
        value: Products
      - action: click
        description: 使用稳定元素key添加Backpack到购物车
        selector: add_to_cart_backpack_btn
      - action: assert_text
        description: 断言购物车角标为1
        selector: shopping_cart_badge
        value: "1"
      - action: click
        description: 使用稳定元素key打开购物车
        selector: shopping_cart_link
      - action: assert_text
        description: 断言进入购物车页
        selector: sauce_page_title
        value: Your Cart
      - action: assert_text
        description: 断言购物车中存在Backpack商品
        selector: cart_item_backpack_name
        value: Sauce Labs Backpack
      - action: click
        description: 使用稳定元素key打开侧边菜单
        selector: menu_button
      - action: assert_visible
        description: 断言退出登录入口可见
        selector: logout_sidebar_link
      - action: click
        description: 使用稳定元素key退出登录
        selector: logout_sidebar_link
      - action: assert_visible
        description: 断言已回到登录页
        selector: sauce_login_btn
  test_saucedemo_step_smart_cart_logout_flow:
    description: 步骤级smart：同一业务流程中仅关键操作步骤使用target进入smart定位
    mode: strict
    steps:
      - use_module: saucedemo_login
        description: 登录Saucedemo标准用户
        params:
          username: ${standard_username}
      - action: assert_text
        description: 断言登录后进入商品列表页
        selector: sauce_page_title
        value: Products
      - action: click
        description: step级smart添加Backpack到购物车
        target: Sauce Labs Backpack add to cart button
        mode: smart
      - action: assert_text
        description: 断言购物车角标为1
        selector: shopping_cart_badge
        value: "1"
      - action: click
        description: step级smart打开购物车
        target: shopping cart link in header
        mode: smart
      - action: assert_text
        description: 断言进入购物车页
        selector: sauce_page_title
        value: Your Cart
      - action: assert_text
        description: 断言购物车中存在Backpack商品
        selector: cart_item_backpack_name
        value: Sauce Labs Backpack
      - action: click
        description: step级smart打开侧边菜单
        target: Open Menu
        mode: smart
      - action: assert_visible
        description: 断言退出登录入口可见
        selector: logout_sidebar_link
      - action: click
        description: step级smart退出登录
        target: Logout link in opened left side menu
        mode: smart
      - action: assert_visible
        description: 断言已回到登录页
        selector: sauce_login_btn
  test_saucedemo_agent_case_steps_cart_logout_flow:
    description: Agent运行时steps式：自然语言步骤作为有序计划，执行时边观察页面边决策
    type: agent_case
    steps:
      - 打开 https://www.saucedemo.com/ 登录页
      - 使用标准用户登录 Saucedemo
      - 确认登录后进入商品列表页，页面标题为 Products
      - 添加 Sauce Labs Backpack 到购物车
      - 确认购物车角标数量为 1
      - 打开购物车页面
      - 确认购物车页标题为 Your Cart，且存在 Sauce Labs Backpack 商品
      - 打开左侧菜单
      - 确认 Logout 退出登录入口可见
      - 点击 Logout 退出登录
      - 确认退出后回到登录页，登录按钮可见
    inputs:
      user_type: standard
      username: ${standard_username}
      password: ${common_password}
      product_name: Sauce Labs Backpack
    checkpoints:
      - 登录成功后进入商品列表页，页面标题为 Products
      - Sauce Labs Backpack 已加入购物车
      - 购物车角标数量为 1
      - 购物车页面中存在 Sauce Labs Backpack
      - Logout 退出登录入口可见
    final:
      - 退出登录后回到登录页，Login 按钮可见
  test_saucedemo_agent_case_explore_cart_checkout_flow:
    description: Agent完全探索：只给一句目标，执行时自行观察、规划并完成Saucedemo下单流程
    type: agent_case
    intent: 标准用户登录 Saucedemo，添加指定商品到购物车，进入购物车确认商品和数量，并完成下单流程。
    inputs:
      user_type: standard
      username: ${standard_username}
      password: ${common_password}
      product_name: Sauce Labs Backpack
      checkout_info:
        first_name: Test
        last_name: User
        postal_code: "100000"
    checkpoints:
      - 登录成功后进入商品列表页，页面标题为 Products
      - Sauce Labs Backpack 已加入购物车
      - 购物车页面中存在 Sauce Labs Backpack
      - 订单确认页中商品为 Sauce Labs Backpack
    final:
      - 完成下单后进入 checkout-complete 页面
      - 页面展示 Thank you for your order

  test_saucedemo_agent_case_steps_google_search:
    description: Agent运行时steps式：自然语言步骤作为有序计划，执行时边观察页面边决策
    type: agent_case
    steps:
      - 打开 https://www.autohome.com.cn/beijing/?from=m
      - 搜索框输入“宝马x3”
      - 点击搜索按钮
    checkpoints:
      - 搜索成功之后，页面标题包含 “宝马x3”

  test_saucedemo_agent_case_explore_Google_search:
    description: Agent完全探索：只给一句目标，执行时自行观察、规划并完成Saucedemo下单流程
    type: agent_case
    intent: 访问https://www.autohome.com.cn/beijing/?from=m, 搜索 “宝马x3”
    checkpoints:
      - 搜索成功之后，页面标题包含 “宝马x3”
