test_data:
  test_mall_order_list:
    description: "商城订单列表"
    steps:
      - use_module: login_mall_steps
      - action: click
        selector: mall_search_button
      - action: click
        selector: mall_search_input
      - action: fill
        selector: mall_search_input
        value : ${mall_order_card_phone}
      - action: press_key
        selector: mall_search_input
        value: Enter
      - action: assert_text_contains
        selector: mall_order_card_phone
        value: ${mall_order_card_phone}
      - action: assert_text_contains
        selector: mall_order_card_status
        value: ${mall_order_card_status}
      - action: assert_text_contains
        selector: mall_order_card_username
        value: ${mall_order_card_username}
      - action: assert_text_contains
        selector: mall_order_card_car_title
        value: ${mall_order_card_car_title}
      - action: assert_text_contains
        selector: mall_order_card_invoice_title
        value: ${mall_order_card_invoice_title}
      - action: assert_text_contains
        selector: mall_order_card_deliver_title
        value: ${mall_order_card_deliver_title}
      - action: assert_text_contains
        selector: mall_order_card_car_time_title
        value: ${mall_order_card_car_time_title}
      - action: assert_text_contains
        selector: mall_order_card_car_value
        value: ${mall_order_card_car_value}
      - action: assert_text_contains
        selector: mall_order_card_invoice_value
        value: ${mall_order_card_invoice_value}
      - action: assert_text_contains
        selector: mall_order_card_deliver_value
        value: ${mall_order_card_deliver_value}
      - action: assert_text_contains
        selector: mall_order_card_car_time_value
        value: ${mall_order_card_car_time_value}

  test_mall_order_list_order_status:
    description: "商城订单列表"
    steps:
      - use_module: login_mall_steps
      - action: click
        selector: mall_order_search_order_status
      - action: click
        selector: mall_order_search_order_status_1
      - action: assert_text_contains
        selector: mall_order_card_status
        value: ${mall_order_card_status1}

  test_mall_order_list_invoice_upload:
    description: "商城订单发票上传"
    steps:
      - use_module: login_mall_steps
      - action: click
        selector: 发票状态筛选
      - action: click
        selector: 待上传
      - action: click
        selector: 上传发票按钮
      - action: upload
        selector: 上传发票
        value: files/ahoh/invoice.jpg
      - action: assert_text
        selector: 重新上传
        value: 重新上传
      - action: click
        selector: 提交

  test_mall_order_list_other_materials_upload:
    description: "商城订单其他材料上传"
    steps:
      - use_module: login_mall_steps
      - action: click
        selector: 发票状态筛选
      - action: click
        selector: 待上传
      - action: click
        selector: 上传发票按钮
      - action: upload
        selector: 上传发票
        value: files/ahoh/invoice.jpg
      - action: assert_text
        selector: 重新上传
        value: 重新上传
      - action: upload
        selector: 其他材料上传
        value: files/ahoh/invoice.jpg
      - action: upload
        selector: 其他材料上传
        value: files/ahoh/invoice.jpg
      - action: upload
        selector: 其他材料上传
        value: files/ahoh/invoice.jpg
      - action: upload
        selector: 其他材料上传
        value: files/ahoh/invoice.jpg
      - action: upload
        selector: 其他材料上传
        value: files/ahoh/invoice.jpg
      - action: upload
        selector: 其他材料上传
        value: files/ahoh/invoice.jpg
      - action: upload
        selector: 其他材料上传
        value: files/ahoh/invoice.jpg
      - action: upload
        selector: 其他材料上传
        value: files/ahoh/invoice.jpg
      - action: upload
        selector: 其他材料上传
        value: files/ahoh/invoice.jpg
      - action: click
        selector: 提交

  test_mall_order_list_view_invoice:
    description: "商城订单查看发票"
    steps:
      - use_module: login_mall_steps
      - action: click
        selector: 发票状态筛选
      - action: click
        selector: 已上传
      - action: click
        selector: 查看发票
      - action: assert_text_contains
        selector: 发票已上传
        value: '发票已上传'

  test_order_up:
    description: "上传交车"
    steps:
      - use_module: login_mall_steps
      - action: click
        selector: 交车状态_筛选
      - action: click
        selector: 筛选_待提交
      - action: click
        selector: 上传交车
      - action: click
        selector: 交车日期_选择框
      - action: click
        selector: 日期确认
      - action: fill
        selector: 车架号
        value: vinNo
      - action: 上传
        selector: 交车证明_选择
        value: files\ahoh\test.jpg
      - action: wait
      - action: store_input_value
        selector: 日期展示
        variable_name: 日期展示
      - action: store_input_value
        selector: 车架号
        variable_name: 车架号
      - action: click
        selector: 提交按钮
      - action: click
        selector: 二次提交按钮
  test_order_check:
    description: "查看交车"
    steps:
      - use_module: login_mall_steps
      - action: click
        selector: 交车状态_筛选
      - action: click
        selector: 筛选_已交车
      - action: click
        selector: 查看交车
      - action: wait
      - action: assert_value
        selector: 日期展示
        value: ${日期展示}
      - action: assert_value
        selector: 车架号
        value: ${车架号}