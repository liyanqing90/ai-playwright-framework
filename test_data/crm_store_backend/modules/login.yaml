    selector: "账号密码登录tab"
  - action: click
    selector: 账号输入框
  - action: fill
    selector: 账号输入框
    value: ${flagship_stores_account}
  - action: click
    selector: 密码输入框
  - action: fill
    selector: 密码输入框
