test_data:
  test_own_stores_name_query:
    description: "自营店-部门&员工管理-姓名搜索"
    steps:
      - use_module: login_steps_own_stores
      - action: click
        selector: 组织管理
      - action: wait
      - action: click
        selector: 部门&员工管理
      - action: wait
      - action: fill
        selector: 姓名搜索
        value: ${name}
      - action: click
        selector: 商城门店查询按钮
      - action: wait
      - action: assert_text
        selector: 姓名
        value: ${name}
      - action: wait

  test_own_stores_position_query:
    description: "自营店-部门&员工管理-岗位搜索"
    steps:
      - use_module: login_steps_own_stores
      - action: click
        selector: 组织管理
      - action: click
        selector: 部门&员工管理
      - action: wait
      - action: click
        selector: 岗位搜索
      - action: click
        selector: 管家
      - action: click
        selector: 商城门店查询按钮
      - action: wait
      - action: assert_text
        selector: 列表_管家
        value: 管家
      - action: wait

  test_own_stores_Details:
    description: "自营店-部门&员工管理-查看详情"
    steps:
      - use_module: login_steps_own_stores
      - action: click
        selector: 组织管理
      - action: wait
      - action: click
        selector: 部门&员工管理
      - action: wait
      - action: fill
        selector: 姓名搜索
        value: ${name}
      - action: click
        selector: 商城门店查询按钮
      - action: wait
      - action: store_text
        selector: 姓名
        variable_name: 列表_姓名
      - action: click
        selector: 商城门店查看详情
      - action: wait
      - action: switch_window
      - action: assert_url
        value: ${jump_url}
      - action: assert_text
        selector: ${detail_name}
        value: ${列表_姓名}
      - action: wait

  test_own_stores_mall_management:
    description: "自营店-商城管理"
    steps:
      - use_module: login_steps_own_stores
      - action: click
        selector: 商城
      - action: wait
      - action: click
        selector: 商城管理
      - action: wait
        value: '6'
      - action: switch_window
      - action: wait
      - action: assert_url
        value: ${mall_management_url}
      - action: assert_text
        selector: 账号昵称
        value: ${mall_management_nick_name1}
      - action: assert_visible
        selector: 销售额
      - action: wait

  test_own_stores_my_wallet:
    description: "自营店-我的钱包"
    steps:
      - use_module: login_steps_own_stores
      - action: click
        selector: 商城
      - action: wait
      - action: click
        selector: 我的钱包
      - action: wait
        value: '3'
      - action: switch_window
      - action: wait
      - action: assert_url
        value: ${my_wallet_url}
      - action: assert_visible
        selector: 交易记录
      - action: wait

  test_flagship_stores_mall_management:
    description: "旗舰店-商城管理"
    steps:
      - use_module: login_steps_flagship_stores
      - action: click
        selector: 商城
      - action: wait
      - action: click
        selector: 商城管理
      - action: wait
        value: '6'
      - action: switch_window
      - action: wait
      - action: assert_url
        value: ${mall_management_url}
      - action: assert_text
        selector: 账号昵称
        value: ${mall_management_nick_name2}
      - action: assert_visible
        selector: 销售额
      - action: wait

  test_flagship_stores_my_wallet:
    description: "旗舰店-我的钱包"
    steps:
      - use_module: login_steps_flagship_stores
      - action: click
        selector: 商城
      - action: wait
      - action: click
        selector: 我的钱包
      - action: wait
        value: '3'
      - action: switch_window
      - action: wait
      - action: assert_url
        value: ${my_wallet_url}
      - action: assert_visible
        selector: 交易记录
      - action: wait


