test_data:
  test_order_approval_list_query:
    description: "订单审核列表查询"
    steps:
      - use_module: login_steps
      - action: click
        selector: 审批中心
      - action: click
        selector: 订单审核列表
      - action: assert_url
        value: https://ahohcrm.autohome.com.cn/#/approval/approvalList
      - action: fill
        selector: 线索ID输入框
        value: ${线索ID}
      - action: click
        selector: 查询
      - action: wait
      - action: assert_text
        selector: 列表ID
        value: ${线索ID}

  test_order_approval_list_processing:
    description: "订单审核列表处理"
    steps:
      - use_module: login_steps
      - action: click
        selector: 审批中心
      - action: click
        selector: 订单审核列表
      - action: fill
        selector: 线索ID输入框
        value: ${线索ID}
      - action: click
        selector: 查询
      - action: wait
      - action: expect_popup
        real_action: click
        selector: 处理
        variable_name: pop_index
      - action: assert_text
        selector: 列表ID
        value: ${线索ID}
      - action: click
        selector: 同意
      - action: click
        selector: 关闭
      - action: click
        selector: 驳回
      - action: click
        selector: 关闭
